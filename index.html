<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Talk it Out</title>
  <link rel="icon" type="image/png" href="logo.png">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f5f5f7;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 480px;
      margin: 2rem 1rem;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      margin: 0 0 0.25rem;
      font-size: 1.5rem;
      font-weight: 600;
    }

    p {
      color: #666;
      margin: 0 0 1.5rem;
      font-size: 0.9rem;
    }

    input {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1px solid #ddd;
      border-radius: 12px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus {
      border-color: #007aff;
    }

    button {
      width: 100%;
      margin-top: 0.75rem;
      padding: 0.75rem;
      background: #0033d9;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover {
      background: #0066d9;
    }

    button:active {
      background: #0055b3;
    }

    button.loading {
      opacity: 0.6;
      pointer-events: none;
    }

    audio {
      width: 100%;
      margin-top: 1.5rem;
    }
  </style>
</head>

<body>
  <div class="card">
    <img style="max-width: 50%;margin-bottom: 1em;" src="logo.png" alt="TIO Logo" />
    <p>Give me a URL and I'll talk it out to you</p>
    <input id="url" type="url" placeholder="https://..." autofocus />
    <button id="play">Play Now</button>
    <audio id="player" controls hidden />
  </div>
  <script>
    const url = document.getElementById('url');
    const btn = document.getElementById('play');
    const player = document.getElementById('player');

    async function play() {
      if (!url.value) return;
      btn.classList.add('loading');
      btn.textContent = 'Loading ...';
      player.src = new URL('stream?url=' + encodeURIComponent(url.value), window.location.href).href;
      player.play();
    }

    player.onplaying = () => {
      btn.classList.remove('loading');
      player.hidden = false
      btn.textContent = 'Play Now';
    };

    btn.addEventListener('click', play);
    url.addEventListener('keydown', e => {if (e.key === 'Enter') play();});
  </script>
</body>

</html>
